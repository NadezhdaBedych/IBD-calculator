<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор вероятности ВЗК</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 30px;
    }

    .card {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 { margin-top: 0; }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .high { background: #fef2f2; color: #991b1b; }
    .low { background: #f0fdf4; color: #166534; }

    .details {
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Калькулятор вероятности ВЗК</h1>

  <label>Альбумин (г/л)</label>
  <input id="albumin" type="number">

  <label>СРБ (г/л)</label>
  <input id="crp" type="number">

  <label>Фекальный кальпротектин (мкг/г)</label>
  <input id="calprotectin" type="number">

  <label>ТМАО (мкмоль/л)</label>
  <input id="tmao" type="number">

  <label>ЛПС-белок (нг/мл)</label>
  <input id="lps" type="number">

  <button onclick="calculate()">Рассчитать</button>

  <div id="result" class="result"></div>

  <button onclick="toggleDetails()">Показать подробности модели</button>

  <div id="details" class="details">
    Площадь под ROC-кривой: AUC = 0,902 (95% ДИ 0,858–0,947).<br>
    Оптимальный порог вероятности, определённый по ROC-анализу с использованием индекса Юдена: P = 0,73.<br>
    Чувствительность модели составляет 78,8%, специфичность — 97,2%.
  </div>

</div>

<script>

const THRESHOLD = 0.73;

function calculate() {
  try {
    const albumin = parseFloat(document.getElementById('albumin').value);
    const crp = parseFloat(document.getElementById('crp').value);
    const calprotectin = parseFloat(document.getElementById('calprotectin').value);
    const tmao = parseFloat(document.getElementById('tmao').value);
    const lps = parseFloat(document.getElementById('lps').value);

    if ([albumin, crp, calprotectin, tmao, lps].some(isNaN)) {
      throw new Error("Заполните все поля");
    }

    const z = -0.046
      - 0.013 * albumin
      - 0.011 * crp
      + 0.055 * calprotectin
      + 0.133 * tmao
      - 0.043 * lps;

    const p = 1 / (1 + Math.exp(-z));
    const percent = (p * 100).toFixed(1);

    const result = document.getElementById("result");

    if (p >= THRESHOLD) {
      result.className = "result high";
      result.innerHTML = `
        <b>Высокая вероятность наличия ВЗК</b><br><br>
        ${percent}%<br>
        Вероятность ≥ 0,73
      `;
    } else {
      result.className = "result low";
      result.innerHTML = `
        <b>Вероятность ниже диагностического порога</b><br><br>
        ${percent}%<br>
        Вероятность < 0,73
      `;
    }

    result.style.display = "block";

  } catch (e) {
    alert(e.message);
  }
}

function toggleDetails() {
  const d = document.getElementById("details");
  d.style.display = d.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
